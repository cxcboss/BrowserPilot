<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>BrowserPilot</h1>
      <span id="status" class="status disconnected">未连接</span>
    </div>
    <div class="info">
      <label>WebSocket 端口</label>
      <div class="row">
        <input id="port" type="number" value="9876" min="1024" max="65535">
        <button id="save">保存</button>
      </div>
    </div>
    <button id="reconnect" class="btn">重新连接</button>
    <div class="footer">
      <p>MCP 服务器配置：</p>
      <pre id="config">{
  "mcpServers": {
    "browserpilot": {
      "command": "node",
      "args": ["/path/to/packages/mcp-server/dist/index.js"]
    }
  }
}</pre>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
