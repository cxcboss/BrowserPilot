<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>BrowserPilot</h1>
      <span id="status" class="status disconnected">未连接</span>
    </div>
    <div class="info">
      <label>WebSocket 端口</label>
      <div class="row">
        <input id="port" type="number" value="9877" min="1024" max="65535">
        <button id="save">保存</button>
      </div>
    </div>
    <button id="reconnect" class="btn">重新连接</button>
    <div class="footer">
      <p>使用方法：</p>
      <pre>1. 启动服务：npx @browserpilot/server
2. 配置 AI 工具（见 README）
3. 对 AI 说话即可控制浏览器</pre>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
